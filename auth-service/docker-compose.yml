services:
  postgres:
    image: postgres:16
    container_name: erba-platform-postgres
    environment:
      POSTGRES_DB: erba_platform
      POSTGRES_USER: erba
      POSTGRES_PASSWORD: erba
    ports:
      - "5432:5432"
    volumes:
      - erba_postgres_data:/var/lib/postgresql/data

volumes:
  erba_postgres_data: